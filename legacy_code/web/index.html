<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Culinary AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <a class="nav-link" href="/kitchen/index.html">Готувати з шефом</a>
</head>



<body>

    <h1 class="app-title">Кулінарний AI‑помічник</h1>
    <a href="chef_chat.html" class="chef-chat-link">Чат із шефом</a>
    


    <!-- INPUT BLOCK -->
    <section class="section input-section">
        <div class="input-block">
            <label for="ingredients">Введи інгредієнти через кому:</label>
            <input id="ingredients" type="text" placeholder="курка, лимон...">
            <button onclick="startFlow()">Почати</button>
        </div>
    </section>

    <!-- CATEGORY BLOCK -->
    <section id="categories" class="section categories-section">
        <!-- JS вставляє категорії -->
    </section>

    <!-- DISH BLOCK -->
    <section id="dishes" class="section dishes-section">
        <!-- JS вставляє страви -->
    </section>

    <!-- FULL RECIPE SECTION (hidden until dish is selected) -->
    <div id="recipe-section" class="hidden">
 
    <!-- Static section title/Dynamic dish title -->
    <h2 id="recipe-title" class="section-title"></h2>
    
    <!-- Recipe content inserted by JS -->
    <section id="recipe" class="section recipe-section">
        <!-- JS вставляє рецепт -->
    </section>   
        
    </div>

    <!-- SIDE PANEL -->
    <div id="sidePanel" class="side-panel">
        <div class="side-panel-overlay"></div>

        <div class="side-panel-content">
            <button class="side-panel-close">×</button>

            <h2 class="ingredient-title"></h2>

            <p class="ingredient-description"></p>

            <h3 class="pairing-title">Поєднання</h3>

            <div class="pairing-grid"></div>
        </div>
    </div>

    <!-- ВЕЛИКЕ ЧАТ-ВІКНО ШЕФА -->
    <div id="chefChat" class="chef-chat is-hidden">
        <div class="chef-chat-header">
            <div class="chef-avatar-badge">
                <div class="chef-avatar-inner">
                    <div class="chef-avatar-face"></div>
                    <div class="chef-avatar-collar"></div>
                </div>
            </div>
            <div class="chef-chat-title-block">
                <div class="chef-chat-title">Твій шеф‑наставник</div>
                <div class="chef-chat-subtitle">Поясню, підкажу, підлаштую рецепт під тебе</div>
            </div>
            <button id="chefChatClose" class="chef-chat-close">×</button>
        </div>

        <div id="chefChatMessages" class="chef-chat-messages">
            <!-- JS: повідомлення шефа та користувача -->
        </div>

        <div class="chef-chat-footer">
            <div id="chefContextBubbles" class="chef-context-bubbles">
                <!-- JS: контекстні бульбашки-поради -->
            </div>
            <div class="chef-chat-input-row">
                <input id="chefUserInput" type="text" placeholder="Запитай шефа про рецепт, заміни або лайфхаки...">
                <button id="chefSendBtn">Надіслати</button>
            </div>
        </div>
    </div>

    <!-- ПЛАВАЮЧА ЧАТ-БУЛЬБАШКА -->
    <button id="chefFab" class="chef-fab">
        <div class="chef-avatar-badge chef-avatar-badge--fab">
            <div class="chef-avatar-inner">
                <div class="chef-avatar-face"></div>
                <div class="chef-avatar-collar"></div>
            </div>
        </div>
        <span class="chef-fab-pulse"></span>
    </button>
    

    <!-- StickyTip container (new dynamic bubbles) -->
    <div id="chefStickyContainer" class="chef-sticky-container"></div>
    
    <script src="script.js"></script>

</body>
</html>
